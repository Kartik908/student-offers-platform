<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- PRIMARY KEYWORDS + BRANDABLE + YEAR -->
  <!-- OPTIMIZED: 53 Characters. 
       Re-added "Best" because "Best Student Discounts" is a massive search term. 
       Fits perfectly within Google's 60-char limit. -->
  <title>Student Offers | Best Verified Student Discounts 2025</title>
  <link rel="canonical" href="https://studentoffers.co/" />

  <!-- DESCRIPTION: Mixes PRIMARY, VALUE-BASED, and PRODUCT-SPECIFIC keywords.
       145 Characters. Perfect length. 
       Combines "Curated" (Quality) with "Directory" (Quantity) for maximum authority. -->
  <meta name="description"
    content="The #1 curated student discount directory. Access $5k+ in verified offers for GitHub, Notion, Adobe & Spotify. Legit 2025 deals without the spam." />

  <!-- KEYWORDS: A comprehensive mix of your provided lists. -->
  <meta name="keywords"
    content="student discounts 2025, verified student discounts, student offers, github student pack, notion student plan, spotify student discount, adobe creative cloud student, free software for students, legit student deals, education pricing, university perks, student beans alternative" />

  <meta name="author" content="Student Offers" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://studentoffers.co/" />

  <meta property="og:title" content="Student Offers | Best Verified Student Discounts 2025" />
  <meta property="og:description"
    content="The #1 curated student discount directory. Access $5k+ in verified offers for GitHub, Notion, Adobe & Spotify. Legit 2025 deals without the spam." />
  <meta property="og:image" content="https://studentoffers.co/og-image.png" />
  <meta property="og:site_name" content="Student Offers" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://studentoffers.co/" />
  <meta property="twitter:title" content="Student Offers | Best Verified Student Discounts 2025" />
  <meta property="twitter:description"
    content="The #1 curated student discount directory. Access $5k+ in verified offers for GitHub, Notion, Adobe & Spotify. Legit 2025 deals without the spam." />
  <meta property="twitter:image" content="https://studentoffers.co/og-image.png" />

  <!-- Performance & Compatibility -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />

  <!-- DNS Prefetch & Preconnect -->
  <link rel="dns-prefetch" href="https://us.i.posthog.com" />
  <link rel="preconnect" href="https://us.i.posthog.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" href="/Favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/Favicon.svg" sizes="any" />
  <link rel="apple-touch-icon" href="/Favicon.svg" />
  <meta name="theme-color" content="#2563EB" />

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />

  <!-- Prevent theme flash by applying theme immediately -->
  <script>
    (function () {
      try {
        const storageKey = 'vite-ui-theme';
        const theme = localStorage.getItem(storageKey) || 'dark';

        // Apply no-transitions class immediately to stop flickering
        document.documentElement.classList.add('no-transitions');

        // Apply theme class before any rendering
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }

        // Remove no-transitions after a brief delay
        requestAnimationFrame(() => {
          setTimeout(() => {
            document.documentElement.classList.remove('no-transitions');
          }, 100);
        });
      } catch (e) {
        // Fallback to dark theme if localStorage fails
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    })();
  </script>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "name": "Student Offers",
          "url": "https://studentoffers.co/",
          "description": "The best place to find verified student discounts for developer tools, design software, and productivity apps.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://studentoffers.co/tools?search={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "Student Offers",
          "url": "https://studentoffers.co/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://studentoffers.co/Favicon.svg"
          }
        }
      ]
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
