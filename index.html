  <!-- Optimized Cache Control for static assets -->
  <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable" />

  <!-- Prevent theme flash by applying theme immediately -->
  <script>
    (function () {
      try {
        const storageKey = 'vite-ui-theme';
        const theme = localStorage.getItem(storageKey) || 'dark';

        // Apply no-transitions class immediately to stop flickering
        document.documentElement.classList.add('no-transitions');

        // Apply theme class before any rendering
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }

        // Remove no-transitions after a brief delay
        requestAnimationFrame(() => {
          setTimeout(() => {
            document.documentElement.classList.remove('no-transitions');
          }, 100);
        });
      } catch (e) {
        // Fallback to dark theme if localStorage fails
        document.documentElement.classList.add('dark');
        document.documentElement.style.colorScheme = 'dark';
      }
    })();
  </script>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">

          }
        }
      ]
    }
  </script>
